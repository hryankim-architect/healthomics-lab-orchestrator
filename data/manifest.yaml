# P1 RNA-seq pipeline — minimum-viable inputs
# All files are NOT committed to git (data/.gitignore). This manifest
# records their public sources + SHA-256 checksums so 'make data' can
# re-fetch deterministically.

# 3 RNA-seq samples (Himes airway smooth muscle, GSE52778)
# Downsampled to 1M paired-end reads via 'curl | zcat | head -4M | gzip'
# ENA URL pattern: vol1/fastq/SRR103/<00X>/<full>/<full>_{1,2}.fastq.gz
samples:
  - id: SRR1039508
    condition: untreated
  - id: SRR1039509
    condition: untreated
  - id: SRR1039512
    condition: dex_treated

# chr22 reference (Ensembl GRCh38 chr22 + GENCODE v45 chr22-filtered GTF)
reference:
  fasta_url: https://ftp.ensembl.org/pub/release-110/fasta/homo_sapiens/dna/Homo_sapiens.GRCh38.dna.chromosome.22.fa.gz
  gtf_source: GENCODE v45 (chr22 filtered)
  index: data/reference/hisat2_index/chr22 (HISAT2)

